parameters:
    env(DATABASE_URL): ''

doctrine:
    dbal:
        default_connection: default
        connections:
            default:
                driver: 'pdo_pgsql'
                server_version: '9.6'
                charset: utf8
                url: '%env(resolve:DATABASE_URL)%'
        types:
            decimalType: App\Shared\Infrastructure\Doctrine\DecimalType
    orm:
        default_entity_manager: default
        auto_generate_proxy_classes: true
        entity_managers:
            default:
                connection: default
                naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
                mappings:
                    ClientContext:
                        is_bundle: false
                        type: xml
                        dir: '%kernel.project_dir%/config/doctrine-xml/ClientContext'
                        prefix: 'App\ClientContext\Domain\Entity'
                        alias: ClientContext
                    LicenseContext:
                        is_bundle: false
                        type: xml
                        dir: '%kernel.project_dir%/config/doctrine-xml/LicenseContext'
                        prefix: 'App\LicenseContext\Domain\Entity'
                        alias: LicenseContext
                    OrderContext:
                        is_bundle: false
                        type: xml
                        dir: '%kernel.project_dir%/config/doctrine-xml/OrderContext'
                        prefix: 'App\OrderContext\Domain\Entity'
                        alias: OrderContext
                    MerchantContext:
                        is_bundle: false
                        type: xml
                        dir: '%kernel.project_dir%/config/doctrine-xml/MerchantContext'
                        prefix: 'App\MerchantContext\Domain\Entity'
                        alias: MerchantContext
                    Shared:
                        is_bundle: false
                        type: xml
                        dir: '%kernel.project_dir%/config/doctrine-xml/Shared'
                        prefix: 'App\Shared\Domain\Entity'
                        alias: Shared
