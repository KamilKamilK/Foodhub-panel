App\LicenseContext\Domain\Entity\LicenseAdditionalDevice:
  exclusion_policy: ALL
  properties:
    id:
      expose: true
      type: integer
      groups: [ licenseGet ]
    priceMonth:
      expose: true
      type: decimalType
      groups: [ licenseGet ]
    priceYear:
      expose: true
      type: decimalType
      groups: [ licenseGet ]
    currency:
      expose: true
      type: string
      groups: [ licenseGet ]
    type:
      expose: true
      type: string
      groups: [ licenseGet ]
  virtual_properties:
    name:
      type: string
      exp: object.getTranslation(service('app.locale_service')).getName()
      groups: [ licenseGet ]
