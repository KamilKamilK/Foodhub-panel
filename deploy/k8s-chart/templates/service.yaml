apiVersion: v1
kind: Service
metadata:
  name: {{ include "k8s-chart.fullname" . }}
  labels:
{{ include "k8s-chart.labels" . | indent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: {{ include "k8s-chart.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
